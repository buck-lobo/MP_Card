name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest tests/ --tb=short
    - name: Run Bandit security check
      run: |
        bandit -r bot.py config.py --exclude-dir tests
    - name: Run Flake8 linting
      run: |
        pip install flake8
        flake8 bot.py config.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 bot.py config.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
